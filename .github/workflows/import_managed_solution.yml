name: Import Managed Solution to TEST

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SOLUTION_NAME: Devops_POC
      SOURCE_BRANCH: Managed_Solutions

    steps:

    - name: Checkout Managed Solutions Branch
      uses: actions/checkout@v4
      with:
        ref: ${{ env.SOURCE_BRANCH }}
        fetch-depth: 0

    - name: Install Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1

    - name: Pack Managed Solution
      uses: microsoft/powerplatform-actions/pack-solution@v1
      with:
        solution-folder: solutions/${{ env.SOLUTION_NAME }}
        solution-file: ${{ env.SOLUTION_NAME }}_Managed.zip
        solution-type: Managed

    - name: Import Managed Solution to TEST
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: ${{ env.SOLUTION_NAME }}_Managed.zip
        publish-changes: true

    - name: Deployment Completed
      run: |
        echo "======================================"
        echo "Managed Solution Imported Successfully"
        echo "Solution : $SOLUTION_NAME"
        echo "Environment : TEST"
        echo "======================================"
