name: Power Platform CI/CD All Solutions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    env:
      SOLUTIONS: "PESCore PESSecurity PESDataModel PESAppExperience PESReporting PESAutomation"

    steps:

    # Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Install Power Platform CLI
    - name: Install Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1

    #####################################################
    # EXPORT ALL SOLUTIONS
    #####################################################

    - name: Export Solutions
      run: |
        for SOLUTION in $SOLUTIONS
        do
          echo "Exporting $SOLUTION"

          pac solution export \
            --name $SOLUTION \
            --path ${SOLUTION}.zip \
            --managed false
        done

      env:
        PAC_AUTH_CREATE_URL: ${{ secrets.DEV_ENV_URL }}
        PAC_AUTH_CREATE_APPLICATIONID: ${{ secrets.CLIENT_ID }}
        PAC_AUTH_CREATE_CLIENTSECRET: ${{ secrets.CLIENT_SECRET }}
        PAC_AUTH_CREATE_TENANT: ${{ secrets.TENANT_ID }}

    #####################################################
    # UNPACK ALL SOLUTIONS
    #####################################################

    - name: Unpack Solutions
      run: |
        for SOLUTION in $SOLUTIONS
        do
          echo "Unpacking $SOLUTION"

          mkdir -p solutions/$SOLUTION

          pac solution unpack \
            --zipfile ${SOLUTION}.zip \
            --folder solutions/$SOLUTION \
            --packagetype Unmanaged
        done

    #####################################################
    # COMMIT TO PowerApps_Versions BRANCH
    #####################################################

    - name: Commit Solutions
      run: |
        git config user.name "Rahul Ram"
        git config user.email "rahul.ram@conduent.com"

        git fetch origin

        git checkout PowerApps_Versions || git checkout -b PowerApps_Versions

        git pull origin PowerApps_Versions --rebase || echo "First run"

        git add solutions/

        git commit -m "Update solutions from Power Platform pipeline" || echo "No changes"

        git push origin PowerApps_Versions

    #####################################################
    # UPLOAD ARTIFACTS
    #####################################################

    - name: Upload Solution Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: solution_drop
        path: "*.zip"

    #####################################################
    # IMPORT TO TEST (ORDER MATTERS)
    #####################################################

    - name: Import PESCore
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: PESCore.zip
        publish-changes: true

    - name: Import PESSecurity
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: PESSecurity.zip
        publish-changes: true

    - name: Import PESDataModel
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: PESDataModel.zip
        publish-changes: true

    - name: Import PESAppExperience
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: PESAppExperience.zip
        publish-changes: true

    - name: Import PESReporting
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: PESReporting.zip
        publish-changes: true

    - name: Import PESAutomation
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: PESAutomation.zip
        publish-changes: true
