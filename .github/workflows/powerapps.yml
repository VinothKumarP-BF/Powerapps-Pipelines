name: Deploy Managed Solution
 
on:
  workflow_dispatch:
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
 
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: PowerApps_Versions
 
      # Install PAC CLI
      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1
 
      # Pack the unpacked solution from Git as a MANAGED solution
      - name: Pack Managed Solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: ./solutions/Pipeline_Test
          solution-file: ./artifacts/Pipeline_Test_Managed.zip
          solution-type: Managed
 
      # Import Managed Solution
      - name: Import Managed Solution
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.TEST_ENV_URL }}
          tenant-id: ${{ secrets.TENANT_ID }}
          app-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
 
          solution-file: ./artifacts/Pipeline_Test_Managed.zip
 
          publish-changes: true
          overwrite-unmanaged-customizations: true
          holding-solution: false
