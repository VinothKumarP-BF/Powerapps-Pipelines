name: Power Platform connection

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SOLUTION_NAME: POC_ALM
      DEPLOYMENT_SETTINGS_FILE: settings/test-settings.json

    steps:

    #################################################
    # CHECKOUT
    #################################################

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    #################################################
    # INSTALL POWER PLATFORM CLI
    #################################################

    - name: Install Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1

    #################################################
    # EXPORT MANAGED SOLUTION FROM TEST
    #################################################

    - name: Export Managed Solution
      uses: microsoft/powerplatform-actions/export-solution@v1
      with:
        environment-url: ${{ secrets.DEV_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-name: ${{ env.SOLUTION_NAME }}
        solution-output-file: managed.zip
        managed: true

    #################################################
    # VERIFY DEPLOYMENT SETTINGS
    #################################################

    - name: Verify Deployment Settings File
      run: |
        echo "Checking deployment settings file..."

        if [ -f "${{ env.DEPLOYMENT_SETTINGS_FILE }}" ]; then
          echo "Deployment settings found."
          echo ""
          cat "${{ env.DEPLOYMENT_SETTINGS_FILE }}"
        else
          echo "Deployment settings file not found."
          exit 1
        fi

    #################################################
    # UNPACK SOLUTION
    #################################################

    - name: Unpack Solution
      uses: microsoft/powerplatform-actions/unpack-solution@v1
      with:
        solution-file: managed.zip
        solution-folder: solutions/${{ env.SOLUTION_NAME }}
        solution-type: Managed

    #################################################
    # CREATE BRANCH
    # cnt-solutions-YYYYMMDD-1
    #################################################

    - name: Create Deployment Branch
      run: |
        git fetch --all

        TODAY=$(date +%Y%m%d)

        LAST_NUM=$(git branch -r \
          | grep "origin/cnt-solutions-${TODAY}-" \
          | sed "s|origin/cnt-solutions-${TODAY}-||" \
          | sort -n \
          | tail -1)

        if [ -z "$LAST_NUM" ]; then
          NEXT_NUM=1
        else
          NEXT_NUM=$((LAST_NUM + 1))
        fi

        BRANCH_NAME="cnt-solutions-${TODAY}-${NEXT_NUM}"

        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

        git checkout -b "$BRANCH_NAME"

        echo "Created Branch: $BRANCH_NAME"

    #################################################
    # COMMIT SOLUTION FILES
    #################################################

    - name: Commit Solution Files
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add solutions/

        git commit -m "Store solution ${{ env.SOLUTION_NAME }}" || echo "No changes"

        git push --set-upstream origin $BRANCH_NAME

    #################################################
    # IMPORT INTO PROD
    #################################################

    - name: Import Solution to PROD
      uses: microsoft/powerplatform-actions/import-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}
        solution-file: managed.zip
        settings-file: ${{ env.DEPLOYMENT_SETTINGS_FILE }}
        publish-changes: true
        use-node-auth: true

    #################################################
    # ATTEMPT TO PUBLISH / ACTIVATE
    #################################################

    - name: Publish Customizations
      uses: microsoft/powerplatform-actions/publish-solution@v1
      with:
        environment-url: ${{ secrets.TEST_ENV_URL }}
        tenant-id: ${{ secrets.TENANT_ID }}
        app-id: ${{ secrets.CLIENT_ID }}
        client-secret: ${{ secrets.CLIENT_SECRET }}

    #################################################
    # COMPLETION MESSAGE
    #################################################

    - name: Deployment Complete
      run: |
        echo ""
        echo "=============================================="
        echo "Deployment completed"
        echo "Solution : ${{ env.SOLUTION_NAME }}"
        echo "Target   : PROD"
        echo "Settings : ${{ env.DEPLOYMENT_SETTINGS_FILE }}"
        echo "Branch   : $BRANCH_NAME"
        echo "=============================================="
