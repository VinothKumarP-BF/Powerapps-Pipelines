name: Power Platform CI/CD All Solutions
 
on:
  workflow_dispatch:
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    # runs-on: [self-hosted, Linux, X64]
 
    env:
      SOLUTIONS: "PESCore PESSecurity PESDataModel PESAppExperience PESReporting PESAutomation"
      TARGET_OWNER_EMAIL: "Vinothkumar.Prabakaran@barrelfuel.com"
 
    steps:
 
    # Checkout repository
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
 
    # Install Power Platform CLI
    - name: Install Power Platform CLI
      uses: microsoft/powerplatform-actions/actions-install@v1
 
    # Authenticate to DEV
    - name: Authenticate DEV
      run: |
        $POWERPLATFORMTOOLS_PACPATH auth create \
          --url "${{ secrets.DEV_ENV_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"
 
        $POWERPLATFORMTOOLS_PACPATH auth list
 
    #################################################
    # EXPORT SOLUTIONS
    #################################################
 
    - name: Export Solutions
      run: |
        for SOLUTION in $SOLUTIONS
        do
          echo "==================================="
          echo "Exporting: $SOLUTION"
          echo "==================================="
 
          $POWERPLATFORMTOOLS_PACPATH solution export \
            --name "$SOLUTION" \
            --path "${SOLUTION}.zip" \
            --managed false
        done
 
    #################################################
    # UNPACK SOLUTIONS
    #################################################
 
    - name: Unpack Solutions
      run: |
        for SOLUTION in $SOLUTIONS
        do
          echo "==================================="
          echo "Unpacking: $SOLUTION"
          echo "==================================="
 
          mkdir -p solutions/$SOLUTION
 
          $POWERPLATFORMTOOLS_PACPATH solution unpack \
            --zipfile "${SOLUTION}.zip" \
            --folder "solutions/$SOLUTION" \
            --packagetype Unmanaged
        done
 
    #################################################
    # COMMIT TO PowerApps_Versions
    #################################################
 
    - name: Commit Solutions
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
 
        git fetch origin
 
        git checkout PowerApps_Versions || git checkout -b PowerApps_Versions
 
        if git show-ref --verify --quiet refs/remotes/origin/PowerApps_Versions
        then
          git reset --hard origin/PowerApps_Versions
        else
          echo "First run"
        fi
 
        git add solutions/
 
        git commit -m "Update solutions from Power Platform pipeline" || echo "No changes"
 
        git push origin PowerApps_Versions
 
    #################################################
    # IMPORT TO TEST & UPDATE FLOW OWNERS
    #################################################
 
    - name: Authenticate TEST
      run: |
        $POWERPLATFORMTOOLS_PACPATH auth create \
          --url "${{ secrets.TEST_ENV_URL }}" \
          --applicationId "${{ secrets.CLIENT_ID }}" \
          --clientSecret "${{ secrets.CLIENT_SECRET }}" \
          --tenant "${{ secrets.TENANT_ID }}"
 
    - name: Import Solutions and Reassign Flow Owners
      run: |
        echo "Fetching internal User ID (systemuserid) in TEST for ${{ env.TARGET_OWNER_EMAIL }}..."
        USER_ID=$($POWERPLATFORMTOOLS_PACPATH data select \
          --entities systemuser \
          --columns systemuserid \
          --filter "internalemailaddress eq '${{ env.TARGET_OWNER_EMAIL }}'" \
          --output json | jq -r '.[0].systemuserid')
 
        if [ -sub -z "$USER_ID" ] || [ "$USER_ID" == "null" ]; then
          echo "ERROR: User ${{ env.TARGET_OWNER_EMAIL }} was not found in the TEST Dataverse environment!"
          exit 1
        fi
        echo "Target User ID in TEST: $USER_ID"
 
        for SOLUTION in $SOLUTIONS
        do
          echo "==================================="
          echo "Importing: $SOLUTION"
          echo "==================================="
 
          # explicitly point to settings.json file
          SETTINGS_FILE="settings/test-settings.json"
          if [ -f "$SETTINGS_FILE" ]; then
            echo "Found settings file: $SETTINGS_FILE. Applying connection mappings during import..."
            $POWERPLATFORMTOOLS_PACPATH solution import \
              --path "${SOLUTION}.zip" \
              --publish-changes \
              --settings-file "$SETTINGS_FILE"
          else
            echo "No settings file found at $SETTINGS_FILE. Importing normally..."
            $POWERPLATFORMTOOLS_PACPATH solution import \
              --path "${SOLUTION}.zip" \
              --publish-changes
          fi
 
          # 2. Check and change Flow Owners for this specific solution
          echo "Checking for Cloud Flows in imported solution: $SOLUTION..."
          FLOW_IDS=$($POWERPLATFORMTOOLS_PACPATH data select \
            --entities workflow \
            --columns workflowid \
            --filter "category eq 5 and solutionid/uniquename eq '$SOLUTION'" \
            --output json | jq -r '.[].workflowid')
 
          if [ -z "$FLOW_IDS" ]; then
            echo "No modern cloud flows found in $SOLUTION."
          else
            for FLOW_ID in $FLOW_IDS; do
              echo "Reassigning Flow (ID: $FLOW_ID) in $SOLUTION to ${{ env.TARGET_OWNER_EMAIL }}..."
              $POWERPLATFORMTOOLS_PACPATH data update \
                --entity workflow \
                --id "$FLOW_ID" \
                --attributes "ownerid=$USER_ID"
            done
          fi
        done
